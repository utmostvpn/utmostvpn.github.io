<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UtmostVPN Setup</title>
    <style>
        :root {
            --bg-color: #050505;
            --surface-color: #121212;
            --neon-cyan: #00e5ff;
            --neon-glow: rgba(0, 229, 255, 0.4);
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        /* Контейнер для твоего логотипа - убрали кривое свечение, добавили скругление */
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            display: block;
            border-radius: 28px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 900;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-glow);
        }

        .section-title {
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .section-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* Улучшенная кнопка копирования */
        .copy-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            background: linear-gradient(145deg, #1a1a1a, #111);
            color: var(--text-main);
            border: 1px solid rgba(0, 229, 255, 0.2);
            padding: 18px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 35px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .copy-btn:active {
            transform: scale(0.97);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-glow);
        }

        /* Стильные карточки приложений */
        .app-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(145deg, #141414, #0d0d0d);
            border: 1px solid rgba(255,255,255,0.03);
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 15px;
            transition: transform 0.2s ease;
        }

        .app-item:active {
            transform: translateY(-2px);
            background: linear-gradient(145deg, #181818, #111);
        }

        .app-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .app-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--neon-cyan);
            border: 1px solid rgba(0, 229, 255, 0.15);
            box-shadow: inset 0 0 10px rgba(0, 229, 255, 0.05);
            font-size: 18px;
        }

        .app-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .app-hint {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .app-actions {
            display: flex;
            gap: 10px;
        }

        /* Обновленные кнопки для SVG иконок */
        .action-add {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            border-radius: 14px;
            background: rgba(0, 229, 255, 0.05);
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.1);
        }

        .action-add:active {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .action-dl {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            border-radius: 14px;
            background: #1a1a1a;
            color: #fff;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s ease;
        }

        .action-dl:active {
            background: #333;
        }

        .toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--neon-cyan);
            color: #000;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 229, 255, 0.4);
        }

        .toast.show {
            bottom: 40px;
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="logo.png" alt="Logo" class="logo">
            <h1>UtmostVPN</h1>
        </div>

        <h2 class="section-title">Выберите приложение</h2>
        <p class="section-desc">Для подключения к VPN понадобится одно из приложений, поддерживающих протокол VLESS.</p>

        <button class="copy-btn" onclick="copyKey()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-top:-2px"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Скопировать ключ
        </button>

        <h2 class="section-title">Мы рекомендуем:</h2>

        <div class="app-item">
            <div class="app-info">
                <div class="app-icon">S</div>
                <div>
                    <div class="app-name">Streisand</div>
                    <div class="app-hint">Авто-настройка</div>
                </div>
            </div>
            <div class="app-actions">
                <a id="btn-streisand" href="#" class="action-add">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </a>
                <a href="https://apps.apple.com/us/app/streisand/id6450534064" target="_blank" class="action-dl">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </a>
            </div>
        </div>

        <div class="app-item">
            <div class="app-info">
                <div class="app-icon" style="font-size: 14px;">BX</div>
                <div>
                    <div class="app-name">V2Box</div>
                    <div class="app-hint">Добавьте ключ вручную</div>
                </div>
            </div>
            <div class="app-actions">
                <a id="btn-v2box" href="#" class="action-add">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </a>
                <a href="https://apps.apple.com/us/app/v2box-v2ray-client/id6446814690" target="_blank" class="action-dl">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </a>
            </div>
        </div>

        <div class="app-item">
            <div class="app-info">
                <div class="app-icon">V2</div>
                <div>
                    <div class="app-name">v2RayTun</div>
                    <div class="app-hint">Лучший выбор</div>
                </div>
            </div>
            <div class="app-actions">
                <a id="btn-v2raytun" href="#" class="action-add">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </a>
                <a href="https://apps.apple.com/us/app/v2raytun/id6476628951" target="_blank" class="action-dl">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </a>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Ключ скопирован!</div>

    <script>
        var params = new URLSearchParams(window.location.search);
        var key = "";

        // Проверяем новую зашифрованную ссылку (Base64)
        if (params.has('data')) {
            try {
                // Расшифровываем строку
                key = decodeURIComponent(escape(atob(params.get('data'))));
            } catch (e) {
                console.error("Ошибка расшифровки", e);
                key = params.get('data'); // Fallback, если что-то пошло не так
            }
        } 
        // Поддержка старых ссылок
        else if (params.has('key')) {
            key = params.get('key');
        }

        key = key.trim();

        if (key) {
            var cleanKey = key.replace("/?", "?");

            document.getElementById('btn-streisand').href = "streisand://import/" + cleanKey;
            
            var bodyKey = cleanKey.replace("vless://", "");
            document.getElementById('btn-v2box').href = "v2box://vless//" + bodyKey;
            
            document.getElementById('btn-v2raytun').href = "v2raytun://import/" + cleanKey;
        }

        function copyKey() {
            if (!key) return;
            var tempInput = document.createElement("input");
            tempInput.value = key;
            document.body.appendChild(tempInput);
            tempInput.select();
            tempInput.setSelectionRange(0, 99999);
            document.execCommand("copy");
            document.body.removeChild(tempInput);

            var toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(function() {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
